<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Opportunities — OpportUnity Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="main-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="logo-icon">◈</span><span>OpportUnity</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="nav-icon">◉</span> Dashboard</a>
      <a href="opportunities.html" class="active"><span class="nav-icon">⊞</span> All Opportunities</a>
      <a href="saved.html"><span class="nav-icon">◈</span> Saved</a>
      <a href="applied.html"><span class="nav-icon">✓</span> Applied</a>
      <a href="deadline-tracker.html"><span class="nav-icon">⏰</span> Deadlines</a>
      <a href="email-sync.html"><span class="nav-icon">✉</span> Email Sync</a>
      <a href="profile.html"><span class="nav-icon">◎</span> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">S</div>
        <div class="user-info">
          <div class="user-name"  id="sidebarName">Student</div>
          <div class="user-email" id="sidebarEmail">student@uni.edu</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <h1>⊞ All Opportunities</h1>
      <p>Browse every internship and hackathon in the database</p>
    </div>

    <!-- STATS -->
    <div class="stats-row" id="statsRow" style="margin-bottom:24px"></div>

    <!-- SEARCH & FILTER -->
    <div class="search-filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search companies, roles, skills…"/>
      </div>
      <select class="filter-select" id="typeFilter">
        <option value="">All Types</option>
        <option value="internship">Internship</option>
        <option value="hackathon">Hackathon</option>
      </select>
      <select class="filter-select" id="sourceFilter">
        <option value="">All Sources</option>
        <option value="internshala">Internshala</option>
        <option value="devpost">Devpost</option>
        <option value="linkedin">LinkedIn</option>
        <option value="gmail">Gmail</option>
      </select>
      <select class="filter-select" id="deadlineFilter">
        <option value="">Any Deadline</option>
        <option value="0">Today</option>
        <option value="7">This Week</option>
        <option value="14">Next 2 Weeks</option>
      </select>
    </div>

    <div class="section-heading">
      <h2 id="resultsTitle">All Opportunities</h2>
      <span id="resultCount" style="font-size:13px;color:var(--text-muted)"></span>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">🔍</div>
      <h3>No matches found</h3>
      <p>Try adjusting your search or filters</p>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="data.js"></script>
<script src="dashboard.js"></script>
<script>
  // Override active filter button behaviour — not needed on this page
  document.addEventListener("DOMContentLoaded", () => {
    loadSidebar();
    renderStats();
    renderCards();
    initSearch();
  });

  function loadSidebar() {
    const u = JSON.parse(localStorage.getItem("ohub_user") || "{}");
    const name = u.name || "Student";
    document.getElementById("sidebarAvatar").textContent = name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    document.getElementById("sidebarName").textContent  = name;
    document.getElementById("sidebarEmail").textContent = u.email || "";
  }

  function renderStats() {
    const internships = MOCK_OPPORTUNITIES.filter(o=>o.type==="internship").length;
    const hackathons  = MOCK_OPPORTUNITIES.filter(o=>o.type==="hackathon").length;
    document.getElementById("statsRow").innerHTML = `
      <div class="stat-card" style="--accent-color:var(--accent)">
        <div class="stat-card-label">Total</div>
        <div class="stat-card-value">${MOCK_OPPORTUNITIES.length}</div>
        <div class="stat-card-sub">opportunities</div>
      </div>
      <div class="stat-card" style="--accent-color:var(--accent2)">
        <div class="stat-card-label">Internships</div>
        <div class="stat-card-value">${internships}</div>
        <div class="stat-card-sub">available</div>
      </div>
      <div class="stat-card" style="--accent-color:var(--accent3)">
        <div class="stat-card-label">Hackathons</div>
        <div class="stat-card-value">${hackathons}</div>
        <div class="stat-card-sub">open</div>
      </div>
      <div class="stat-card" style="--accent-color:var(--accent-warn)">
        <div class="stat-card-label">Closing Today</div>
        <div class="stat-card-value">${MOCK_OPPORTUNITIES.filter(o=>getDaysLeft(o.deadline)===0).length}</div>
        <div class="stat-card-sub">urgent</div>
      </div>`;
  }
</script>
</body>
</html>
