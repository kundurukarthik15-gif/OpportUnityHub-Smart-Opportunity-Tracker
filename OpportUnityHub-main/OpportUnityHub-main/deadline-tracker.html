<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deadlines — OpportUnity Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .timeline-section { margin-bottom: 40px; }
    .timeline-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
    }
    .th-today    { background: rgba(248,113,113,0.1);  color: var(--accent-red);  border: 1px solid rgba(248,113,113,0.2); }
    .th-week     { background: rgba(251,146,60,0.1);   color: var(--accent-warn); border: 1px solid rgba(251,146,60,0.2); }
    .th-twoweeks { background: rgba(110,231,247,0.07); color: var(--accent);      border: 1px solid rgba(110,231,247,0.15); }
    .th-future   { background: rgba(255,255,255,0.03); color: var(--text-secondary); border: 1px solid var(--border); }
    .th-count {
      margin-left: auto;
      padding: 2px 10px;
      border-radius: 50px;
      font-size: 12px;
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
    }
    .deadline-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
      transition: var(--transition);
    }
    .deadline-card:hover { background: var(--bg-card-hover); border-color: var(--border-hover); transform: translateX(4px); }
    .dc-logo {
      width: 40px; height: 40px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, rgba(110,231,247,0.12), rgba(167,139,250,0.12));
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      flex-shrink: 0;
    }
    .dc-info { flex: 1; min-width: 0; }
    .dc-company { font-family: var(--font-display); font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .dc-role    { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dc-meta    { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .dc-right   { text-align: right; flex-shrink: 0; }
    .dc-date    { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .countdown  { font-family: var(--font-display); font-size: 22px; font-weight: 800; }
    .countdown.red    { color: var(--accent-red); }
    .countdown.orange { color: var(--accent-warn); }
    .countdown.blue   { color: var(--accent); }
    .countdown.grey   { color: var(--text-secondary); }
    .no-items { text-align:center; padding: 24px; color: var(--text-muted); font-size:13px; }
  </style>
</head>
<body>
<div class="main-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="logo-icon">◈</span><span>OpportUnity</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="nav-icon">◉</span> Dashboard</a>
      <a href="opportunities.html"><span class="nav-icon">⊞</span> All Opportunities</a>
      <a href="saved.html"><span class="nav-icon">◈</span> Saved</a>
      <a href="applied.html"><span class="nav-icon">✓</span> Applied</a>
      <a href="deadline-tracker.html" class="active"><span class="nav-icon">⏰</span> Deadlines</a>
      <a href="email-sync.html"><span class="nav-icon">✉</span> Email Sync</a>
      <a href="profile.html"><span class="nav-icon">◎</span> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">S</div>
        <div class="user-info">
          <div class="user-name"  id="sidebarName">Student</div>
          <div class="user-email" id="sidebarEmail">student@uni.edu</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>⏰ Deadline Tracker</h1>
      <p>Every opportunity sorted by urgency — never miss a closing date</p>
    </div>

    <!-- TODAY -->
    <div class="timeline-section" id="sec-today"></div>
    <!-- THIS WEEK -->
    <div class="timeline-section" id="sec-week"></div>
    <!-- 2 WEEKS -->
    <div class="timeline-section" id="sec-two"></div>
    <!-- FUTURE -->
    <div class="timeline-section" id="sec-future"></div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="data.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  // sidebar
  const u = JSON.parse(localStorage.getItem("ohub_user") || "{}");
  const name = u.name || "Student";
  document.getElementById("sidebarAvatar").textContent = name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  document.getElementById("sidebarName").textContent  = name;
  document.getElementById("sidebarEmail").textContent = u.email || "";

  renderTimeline();
  // live countdown refresh every second
  setInterval(renderCountdowns, 1000);
});

function buildGroups() {
  const groups = { today:[], week:[], two:[], future:[] };
  MOCK_OPPORTUNITIES.forEach(o => {
    const d = getDaysLeft(o.deadline);
    if      (d === 0)            groups.today.push(o);
    else if (d > 0 && d <= 7)   groups.week.push(o);
    else if (d > 7 && d <= 14)  groups.two.push(o);
    else if (d > 14)             groups.future.push(o);
  });
  // sort each group ascending
  Object.values(groups).forEach(arr => arr.sort((a,b) => a.deadline.localeCompare(b.deadline)));
  return groups;
}

function renderTimeline() {
  const g = buildGroups();

  renderSection("sec-today",  "🔥 Closing Today",    "th-today",    g.today,  "red");
  renderSection("sec-week",   "⚡ This Week",         "th-week",     g.week,   "orange");
  renderSection("sec-two",    "📅 Next 2 Weeks",      "th-twoweeks", g.two,    "blue");
  renderSection("sec-future", "🗓️ Coming Up",         "th-future",   g.future, "grey");
}

function renderSection(secId, title, headerClass, items, countdownClass) {
  const sec = document.getElementById(secId);
  if (!items.length) { sec.innerHTML = ""; return; }

  const cards = items.map(o => deadlineCard(o, countdownClass)).join("");
  sec.innerHTML = `
    <div class="timeline-header ${headerClass}">
      ${title}
      <span class="th-count">${items.length}</span>
    </div>
    ${cards}`;
}

function deadlineCard(o, countdownClass) {
  const days = getDaysLeft(o.deadline);
  const urg  = getUrgencyBadge(days);

  let countdownLabel;
  if      (days < 0)  countdownLabel = "Expired";
  else if (days === 0) countdownLabel = "Today!";
  else                 countdownLabel = `${days}d left`;

  return `
  <div class="deadline-card">
    <div class="dc-logo">${o.logo}</div>
    <div class="dc-info">
      <div class="dc-company">${o.organization}</div>
      <div class="dc-role">${o.role}</div>
      <div class="dc-meta">
        <span class="badge badge-${o.type}" style="font-size:10px">${o.type==="internship"?"Internship":"Hackathon"}</span>
        <span class="badge badge-verified" style="font-size:10px">✓ Verified</span>
        <span style="font-size:11px;color:var(--text-muted)">${SOURCE_ICONS[o.source]} ${SOURCE_LABELS[o.source]}</span>
      </div>
    </div>
    <div class="dc-right">
      <div class="dc-date">Closes ${formatDeadline(o.deadline)}</div>
      <div class="countdown ${countdownClass}" data-deadline="${o.deadline}">${countdownLabel}</div>
      <a href="${o.applyLink}" target="_blank" class="apply-btn" style="margin-top:8px;display:inline-flex">Apply →</a>
    </div>
  </div>`;
}

function renderCountdowns() {
  document.querySelectorAll(".countdown[data-deadline]").forEach(el => {
    const days = getDaysLeft(el.dataset.deadline);
    if      (days < 0)  el.textContent = "Expired";
    else if (days === 0) el.textContent = "Today!";
    else                 el.textContent = `${days}d left`;
  });
}
</script>
</body>
</html>
